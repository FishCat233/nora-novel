version: '3.8'

services:
  nora-novel:
    build: .
    container_name: nora-novel
    ports:
      - "8501:8501"
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - WIKI_PATH=/app/data
      - AUTH_CONFIG_PATH=/app/config/auth.yaml
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
